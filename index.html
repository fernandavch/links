<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fernanda Vergara Chávez | Pentesting Trainee</title>
<style>
    /* Industrial / Noir style */
    body {
        background-color: #000000;
        color: #ffffff;
        font-family: 'Courier New', Courier, monospace;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh; 
        margin: 0;
        padding: 0;
        overflow: hidden;
    }

    .container {
        width: 90%;
        max-width: 400px;
        text-align: center;
    }

    /* --- Avatar --- */
    .avatar-container {
        margin-bottom: 20px;
    }

    .avatar-img {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid #ff1111;
        object-fit: cover;
        box-shadow: 0 0 15px rgba(255, 17, 17, 0.3);
    }

    /* --- Header --- */
    header {
        margin-bottom: 25px;
        padding: 15px;
        border: 1px double #550000;
        background-color: #050505;
    }

    h1 {
        font-size: 1.2rem;
        letter-spacing: 3px;
        margin: 0;
        color: #ff1111;
        text-transform: uppercase;
    }

    .subtitle {
        font-size: 0.75rem;
        letter-spacing: 2px;
        margin-top: 8px;
        color: #fff;
        text-transform: uppercase;
    }

    .divider {
        height: 2px;
        background: linear-gradient(to right, transparent, #ff1111, transparent);
        margin: 15px auto;
        width: 80%;
    }

    /* --- Links --- */
    .link-block {
        display: block;
        background-color: #cc0000;
        color: #000000;
        text-decoration: none;
        padding: 15px;
        margin-bottom: 12px;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-size: 0.85rem;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        border: 2px solid #cc0000;
    }

    .link-block:hover {
        background-color: #000000;
        color: #ff1111;
        border: 2px solid #ff1111;
        box-shadow: 0 0 20px rgba(255, 17, 17, 0.6);
        transform: scale(1.03);
    }

    footer {
        margin-top: 30px;
        font-size: 0.6rem;
        color: #333;
        letter-spacing: 3px;
        text-transform: uppercase;
    }

    @media (max-height: 600px) {
        body { overflow-y: auto; height: auto; padding: 20px 0; }
        .avatar-img { width: 80px; height: 80px; }
    }
</style>
</head>
<body>

    <div class="container">
        <div class="avatar-container">
            <img src="images/avatar.png" alt="Fernanda Vergara" class="avatar-img">
        </div>

        <header>
            <h1>Fernanda Vergara Chávez</h1>
            <div class="subtitle">Pentesting Trainee | Cybersecurity</div>
            <div class="divider"></div>
        </header>

        <a href="https://github.com/fernandavch" class="link-block" target="_blank">GitHub Portfolio</a>
        <a href="https://www.linkedin.com/in/fernandavch/" class="link-block" target="_blank">LinkedIn Profile</a>
        <a href="https://www.credential.net/profile/fernandavch/wallet" class="link-block" target="_blank">Accredible Certs</a>
        <a href="https://www.credly.com/users/fernandavch/" class="link-block" target="_blank">Credly Badges</a>

        <footer>
            [ CONNECTION_SECURED ]
        </footer>
    </div>

</body>
</html>
